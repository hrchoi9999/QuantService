name: quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint
        run: |
          python -m ruff check service_platform\web\app.py service_platform\web\investment_portfolio_api.py service_platform\web\market_analysis_api.py service_platform\web\data_provider.py service_platform\web\user_snapshot_api.py service_platform\web\status_routes.py scripts\validate_web_data.py
      - name: Compile
        run: |
          python -m py_compile service_platform\web\app.py service_platform\web\investment_portfolio_api.py service_platform\web\market_analysis_api.py service_platform\web\data_provider.py service_platform\web\user_snapshot_api.py service_platform\web\status_routes.py scripts\validate_web_data.py
      - name: Stable tests
        run: |
          python -m pytest tests\test_web\test_data_provider.py tests\test_web\test_tseries_api.py tests\test_publishers -q
