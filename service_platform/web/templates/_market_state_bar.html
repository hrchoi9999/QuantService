<div class="market-state-bar market-state-bar--full">
  <div class="market-state-bar-head">
    <div class="market-state-timestamp">기준 시각 {{ market_state_bar.asof_display }}</div>
  </div>
  <div class="market-state-track">
    <div class="market-state-side market-state-side--left">
      <span class="market-state-heading">시장상태</span>
      <strong>{{ market_state_bar.label }}</strong>
    </div>
    <div class="market-state-marker" style="left: {{ market_state_bar.position_percent }}%;">
      <span class="market-state-marker-label market-state-marker-label--stacked">
        <span class="market-state-marker-heading">상태점수</span>
        <span class="market-state-marker-value">{{ market_state_bar.score_text }}</span>
      </span>
    </div>
  </div>
  <div class="market-state-ticks" aria-hidden="true">
    {% for tick in market_state_bar.ticks %}
    <span>{{ tick }}</span>
    {% endfor %}
  </div>
</div>
