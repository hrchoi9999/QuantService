{% extends "base.html" %}

{% block content %}
<section class="hero-card compact-hero">
  <p class="eyebrow">개인정보 안내</p>
  <h1>개인정보 수집·이용 안내</h1>
  <p class="lead">이메일과 의견만 최소한으로 수집하며, 서비스 개선 목적 외에는 사용하지 않습니다.</p>
</section>

<section class="panel">
  <div class="stack-list compact">
    <p><strong>수집 항목</strong>: 이메일(선택), 의견 내용(필수), 접속 경로, 브라우저 정보, IP 해시</p>
    <p><strong>수집 목적</strong>: 서비스 개선, 유료화 전 가치 검증, 중복 제출 및 스팸 방지</p>
    <p><strong>보관 원칙</strong>: 최소 수집, 최소 보관을 지향하며 운영 중 정리합니다.</p>
    <p><strong>주의</strong>: 민감한 투자 비밀번호나 계좌정보는 입력하지 마세요.</p>
  </div>
</section>
{% endblock %}
