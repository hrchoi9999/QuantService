{% extends "base.html" %}

{% block content %}
<section class="hero-card compact-hero">
  <p class="eyebrow">Member Access</p>
  <h1>로그인</h1>
  <p class="lead">결제 연동 전 단계이므로 이메일과 비밀번호만으로 간단히 가입/로그인할 수 있습니다.</p>
  {% if status %}
  <div class="warning-banner">{{ status_messages.get(status, "로그인 정보를 다시 확인해 주세요.") }}</div>
  {% endif %}
</section>

<section class="panel">
  <form class="feedback-form" method="post" action="{{ url_for('login') }}">
    <input type="hidden" name="next" value="{{ next_url }}">
    <div>
      <label class="label" for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required>
    </div>
    <div>
      <label class="label" for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="At least 4 characters" required>
    </div>
    <div class="stack-actions">
      <button class="primary-button" type="submit">Login / Sign up</button>
      <a class="secondary-button" href="{{ next_url }}">돌아가기</a>
    </div>
  </form>
</section>
{% endblock %}
