<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ service_name }} | {{ page_title }}</title>
  <meta name="description" content="Daily stock recommendation snapshots for Korean investors.">
  <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="{{ url_for('home') }}">redbot</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('today') }}">Today</a>
        <a href="{{ url_for('changes') }}">Changes</a>
        <a href="{{ url_for('performance') }}">Performance</a>
        <a href="{{ url_for('feedback') }}">Feedback</a>
        <a href="{{ url_for('status') }}">Status</a>
      </nav>
    </header>

    <main class="content-shell">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer muted">
      <span>redbot beta</span>
      <a href="{{ url_for('privacy') }}">개인정보 안내</a>
    </footer>
  </div>
</body>
</html>
